name: Canary Integration Test - Terraform - Main

# Running tests against the canary tenant

on:
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_TFSCRIPT: 'tests/integration-tests'
  DEV_OVERRIDE: 'assets/provider-config-ghaction.txt'
  TEMP_PLAN_OUTPUT : 'plan-output.txt'

permissions:
  contents: read

jobs:
  test:
    name: Integration Test for Local Terraform Provider against Canary Tenant
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out Git repository
        id: checkout_repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Setup Terraform
        id : setup_terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          terraform_version: latest

      - name: Install local Terraform provider
        id: build_provider
        shell: bash
        run: |
          go mod tidy && make install

      - name: Remove init data and place override
        id: set_to_override
        shell: bash
        run: |
          rm -rf .terraform && rm -rf .terraform.lock.hcl && cp ${{ env.DEV_OVERRIDE }} ~/.terraformrc

      - name: Terraform Apply with local provider
        id: terraform_apply_local
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.CANARY_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          set +e

          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Terraform apply attempt $i..."

            terraform -chdir=$PATH_TO_TFSCRIPT apply \
              -var tenant_url="${{ secrets.CANARY_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -auto-approve -no-color
          
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Terraform apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Terraform apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Terraform apply failed after retries"
          exit 1

      - name: Terraform Destroy with local provider
        if: always()
        id: terraform_destory
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.CANARY_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          set +e

          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Terraform apply attempt $i..."

            terraform -chdir=$PATH_TO_TFSCRIPT destroy \
              -var tenant_url="${{ secrets.CANARY_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -auto-approve -no-color

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Terraform apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Terraform apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Terraform apply failed after retries"
          exit 1
          