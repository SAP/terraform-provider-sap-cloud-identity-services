name: Integration Test - Terraform (All)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1,3' # Every Monday and Wednesday at 7:30 AM IST (2:00 AM UTC)

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  canary-main:
    name: Canary Main
    uses: ./.github/workflows/tf-integration-canary-main.yml
    secrets: inherit

  live-main:
    name: Live Main
    needs: [canary-main]
    uses: ./.github/workflows/tf-integration-live-main.yml
    secrets: inherit

  wait:
    name: Wait
    needs: [live-main]
    runs-on: ubuntu-latest
    steps:
      - name: Wait between test runs
        run: sleep 300

  canary-stable:
    name: Canary Stable
    needs: [wait]
    uses: ./.github/workflows/tf-integration-canary-stable.yml
    secrets: inherit

  live-stable:
    name: Live Stable
    needs: [canary-stable]
    uses: ./.github/workflows/tf-integration-live-stable.yml
    secrets: inherit

  failure-handler:
    name: Handle Failures
    needs: [canary-main, canary-stable, live-main, live-stable]
    if: always()
    uses: ./.github/workflows/integration-test-issue-reporter.yml
    with:
      workflow_name: "Terraform Integration Tests"
      job_results: |
        canary-main: ${{ needs.canary-main.result }}
        canary-stable: ${{ needs.canary-stable.result }}
        live-main: ${{ needs.live-main.result }}
        live-stable: ${{ needs.live-stable.result }}
      labels: 'integration-test,terraform,failure'