name: Canary Integration Test - OpenTofu - Stable

# Running tests against the canary tenant

on:
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_TFSCRIPT: 'tests/integration-tests'
  TEMP_PLAN_OUTPUT : 'plan-output.txt'

permissions:
  contents: read

jobs:
  test:
    name: Integration Test for Stable Provider against Canary Tenant
    runs-on: ubuntu-latest

    environment:
      name: sci
    
    steps:
      - name: Check out Git repository
        id: checkout_repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Setup OpenTofu
        id : setup_opentofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Tofu Init with stable provider
        id: tofu_init
        shell: bash
        run: |
          tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} init -no-color

      - name: Tofu Apply with stable provider
        id: tofu_apply_local
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.CANARY_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tofu apply attempt $i..."

            tofu -chdir=$PATH_TO_TFSCRIPT apply \
              -var tenant_url="${{ secrets.CANARY_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -parallelism=1 \
              -auto-approve -no-color || EXIT_CODE=$?

            if [ ${EXIT_CODE:-0} -eq 0 ]; then
              echo "Tofu apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Tofu apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Tofu apply failed after retries"
          exit 1

      - name: Tofu Destroy with stable provider
        if: always()
        id: tofu_destory
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.CANARY_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tofu apply attempt $i..."

            tofu -chdir=$PATH_TO_TFSCRIPT destroy \
              -var tenant_url="${{ secrets.CANARY_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -auto-approve -no-color || EXIT_CODE=$?

            if [ ${EXIT_CODE:-0} -eq 0 ]; then
              echo "Tofu apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Tofu apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Tofu apply failed after retries"
          exit 1
