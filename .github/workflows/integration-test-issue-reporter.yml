name: Create Issue on Integration Test Failure

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      job_results:
        required: true
        type: string
      labels:
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  check-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check for failures
        id: check
        run: |
          if echo "${{ inputs.job_results }}" | grep -q "failure"; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Find existing issue
        if: steps.check.outputs.has_failures == 'true'
        id: find
        uses: micalevisk/last-issue-action@v2
        with:
          state: open
          labels: ${{ inputs.labels }}

      - name: Get existing issue details
        if: steps.check.outputs.has_failures == 'true'
        id: get-existing
        uses: actions/github-script@v9
        with:
          result-encoding: json
          script: |
            const hasFound = '${{ steps.find.outputs.has-found }}' === 'true';
            if (!hasFound) {
              return { title_match: false, url_match: false, issue_number: 0 };
            }

            const issueNumber = parseInt('${{ steps.find.outputs.issue-number }}');
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const runUrl = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const title = '${{ inputs.workflow_name }} - Integration Test Failure';
            const existingRunUrl = issue.body.match(/https:\/\/github\.com\/[^/]+\/[^/]+\/actions\/runs\/\d+/)?.[0];

            return {
              title_match: issue.title === title,
              url_match: existingRunUrl === runUrl,
              issue_number: issueNumber
            };

      - name: Create issue
        if: steps.check.outputs.has_failures == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const labels = JSON.parse(`${{ inputs.labels }}`);
            const results = `${{ inputs.job_results }}`;
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const workflowName = `${{ inputs.workflow_name }}`;
            const hasFound = '${{ steps.find.outputs.has-found }}' === 'true';
            const titleMatch = hasFound && fromJson('${{ steps.get-existing.outputs.result }}').title_match;
            const urlMatch = hasFound && fromJson('${{ steps.get-existing.outputs.result }}').url_match;

            const title = `${workflowName} - Integration Test Failure`;
            const body = "## Integration Test Failed\n\n" +
              `**Workflow Group:** ${workflowName}\n\n` +
              "**Results:**\n${results}\n\n" +
              `**Run URL:**\n${runUrl}\n\n` +
              `**Triggered by:** @${{ github.actor }}`;

            if (!hasFound || !titleMatch || !urlMatch) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels
              });
              console.log('Created new issue');
            } else {
              console.log('Issue already exists with this run URL, skipping');
            }

