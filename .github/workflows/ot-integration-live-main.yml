name: Prod Integration Test - OpenTofu - Main

# Running tests against the prod tenant

on:
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_TFSCRIPT: 'tests/integration-tests'
  DEV_OVERRIDE: 'assets/provider-config-ghaction.txt'
  TEMP_PLAN_OUTPUT : 'plan-output.txt'

permissions:
  contents: read

jobs:
  test:
    name: Integration Test for Local Provider against Prod Tenant
    runs-on: ubuntu-latest

    environment:
      name: sci
    
    steps:
      - name: Check out Git repository
        id: checkout_repo
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false

      - name: Setup OpenTofu
        id : setup_opentofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: Install local Tofu provider
        id: build_provider
        shell: bash
        run: |
          go mod tidy && make install

      - name: Tofu init to fetch 'time' Terraform provider
        id: tofu_init
        shell: bash
        run: |
          tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} init -no-color

      - name: Remove init data and place override for SCI provider
        id: set_to_override
        shell: bash
        run: |
          rm -rf .terraform/providers/registry.opentofu.org/sap && sed -i '/^provider "registry\.opentofu\.org\/sap\/sap-cloud-identity-services"/,/^}/d' tests/integration-tests/.terraform.lock.hcl && cp ${{ env.DEV_OVERRIDE }} ~/.terraformrc

      - name: Tofu Apply with local provider
        id: tofu_apply_local
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.LIVE_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tofu apply attempt $i..."

            tofu -chdir=$PATH_TO_TFSCRIPT apply \
              -var tenant_url="${{ secrets.LIVE_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -parallelism=2 \
              -auto-approve -no-color || EXIT_CODE=$?

            if [ ${EXIT_CODE:-0} -eq 0 ]; then
              echo "Tofu apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Tofu apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Tofu apply failed after retries"
          exit 1

      - name: Tofu Destroy with local provider
        if: always()
        id: tofu_destory
        shell: bash
        env:
          P12_CERTIFICATE_BASE64_STRING: ${{ secrets.LIVE_P12_CERTIFICATE_BASE64_STRING }}
          PATH_TO_TFSCRIPT: ${{ env.PATH_TO_TFSCRIPT }}
        run: |
          echo "$P12_CERTIFICATE_BASE64_STRING" | base64 --decode > $PATH_TO_TFSCRIPT/cert.p12

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Tofu apply attempt $i..."

            tofu -chdir=$PATH_TO_TFSCRIPT destroy \
              -var tenant_url="${{ secrets.LIVE_TENANT_URL }}" \
              -var certificate_file_path="cert.p12" \
              -var certificate_file_password="${{ secrets.P12_CERTIFICATE_PASSWORD }}" \
              -var certificate="${{ secrets.PEM_CERTIFICATE_STRING }}" \
              -auto-approve -no-color || EXIT_CODE=$?

            if [ ${EXIT_CODE:-0} -eq 0 ]; then
              echo "Tofu apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Tofu apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Tofu apply failed after retries"
          exit 1
