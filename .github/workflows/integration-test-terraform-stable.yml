name: Integration Test - Terraform - Stable Provider

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1,3' # Every Monday and Wednesday at 7:30 AM IST (2:00 AM UTC)

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  
jobs:

  canary-stable:
    name: Canary Stable
    uses: ./.github/workflows/tf-integration-canary-stable.yml
    secrets: inherit

  live-stable:
    name: Live Stable
    uses: ./.github/workflows/tf-integration-live-stable.yml
    secrets: inherit

  failure-handler:
    name: Handle Failures
    needs: [canary-stable, live-stable]
    if: always()
    permissions:
      contents: read
      issues: write
    uses: ./.github/workflows/integration-test-issue-reporter.yml
    with:
      workflow_name: "Terraform Integration Tests - Stable Provider"
      job_results: |
        canary-stable: ${{ needs.canary-stable.result }}
        live-stable: ${{ needs.live-stable.result }}
      labels: 'integration-test,terraform,failure'